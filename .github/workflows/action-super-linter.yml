name: Super Linter

on:
  workflow_dispatch:
  push:
    branches:
      - "*"

concurrency:
  group: super-linter-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      # To report GitHub Actions status checks
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Full clone required so super-linter can resolve GITHUB_BEFORE_SHA.
          fetch-depth: 0
          fetch-tags: false
          persist-credentials: false

      - name: Install Prettier plugins (for summary formatting)
        run: |
          npm install --no-save prettier prettier-plugin-sh prettier-plugin-jinja-template || true

      - name: Super-linter
        uses: super-linter/super-linter@v8
        env:
          # To report GitHub Actions status checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.ref_name }}
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
          VALIDATE_JSCPD: false
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_PYTHON_RUFF_FORMAT: false
          VALIDATE_SHELL_SHFMT: false
          VALIDATE_TRIVY: false
          VALIDATE_YAML_PRETTIER: false
